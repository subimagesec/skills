name: Deploy to GitHub Pages

# Builds the marketplace repo as a GitHub Pages site at skills.subimage.io.
# Uses the Actions deployment source (no separate gh-pages branch) so the
# protected `main` branch never receives an auto-commit from Pages itself.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but do not cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          # Auto-enable GitHub Pages with build_type=workflow on first run.
          # Avoids the chicken-and-egg of needing the UI to enable Pages
          # before this workflow can deploy to it.
          enablement: true

      - name: Upload Pages artifact
        # Upload the entire repo. Pages will serve every file as-is because
        # of the .nojekyll marker at the root, including .claude-plugin/ and
        # plugins/<plugin>/skills/<skill>/SKILL.md.
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
